<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>3DGS PLY Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #info {
      position: absolute; top: 10px; left: 10px; color: #fff;
      font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="info">Loading splat_final.ply...</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.6/build/gaussian-splats-3d.module.js"
    }
  }
  </script>
  <script type="module">
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    const info = document.getElementById('info');

    try {
      const viewer = new GaussianSplats3D.Viewer({
        cameraUp: [0, -1, 0],
        initialCameraPosition: [0, 0, 5],
        initialCameraLookAt: [0, 0, 0],
        sharedMemoryForWorkers: false,
        sphericalHarmonicsDegree: 2
      });

      await viewer.addSplatScene('/export/splat_final.ply', {
        progressiveLoad: true,
        showLoadingUI: true
      });
      viewer.start();

      info.textContent = 'Loaded splat_final.ply — drag to rotate, scroll to zoom';
    } catch(e) {
      info.textContent = `Error: ${e.message}`;
      console.error(e);
    }
  </script>
</body>
</html>
